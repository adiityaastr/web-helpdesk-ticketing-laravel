<!DOCTYPE html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Buat Tiket — Helpdesk</title><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{colors:{teal:{50:'#f0fdfa',100:'#ccfbf1',200:'#99f6e4',600:'#0d9488',700:'#0f766e',800:'#115e59'},slate:{50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',900:'#0f172a'}}}}}</script><link rel="stylesheet" href="../fonts/material-symbols-subset.css"><style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}body{font-family:'Inter',ui-sans-serif,system-ui,sans-serif;margin:0}</style></head>
<body class="antialiased bg-slate-50">
<div class="flex min-h-screen bg-slate-50">
<aside class="fixed inset-y-0 left-0 z-50 w-72 flex-shrink-0 transform border-r border-slate-200 bg-white lg:translate-x-0">
<div class="flex h-16 items-center gap-3 border-b border-slate-100 px-6"><div class="flex h-10 w-10 items-center justify-center rounded-lg bg-teal-600"><span class="material-symbols-outlined text-white" style="font-size:22px">support_agent</span></div><div><h1 class="text-lg font-semibold text-teal-800">Helpdesk</h1><p class="text-[10px] text-slate-500">Portal Pelanggan</p></div></div>
<nav class="flex-1 space-y-1 px-4 py-4">
<a href="portal-dashboard.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-50"><span class="material-symbols-outlined text-slate-400" style="font-size:20px">dashboard</span>Dashboard</a>
<a href="portal-tickets.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm font-medium border-r-4 border-teal-600 bg-teal-50 text-teal-700"><span class="material-symbols-outlined text-teal-600" style="font-size:20px;font-variation-settings:'FILL' 1">mail</span>Tiket Saya</a>
<a href="portal-knowledge.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-50"><span class="material-symbols-outlined text-slate-400" style="font-size:20px">article</span>Basis Pengetahuan</a>
</nav>
<div class="border-t border-slate-100 p-4"><div class="flex w-full items-center justify-center gap-2 rounded-lg bg-teal-600 px-4 py-2.5 text-sm font-medium text-white"><span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">add</span>Buat Tiket Baru</div></div>
</aside>
<div class="flex flex-1 flex-col lg:ml-72">
<header class="sticky top-0 z-30 flex h-16 items-center justify-between border-b border-slate-200 bg-white px-6"><div class="hidden h-9 flex-1 items-center gap-2 rounded-lg border border-slate-200 bg-slate-50 px-3 lg:flex lg:max-w-sm"><span class="material-symbols-outlined text-slate-400" style="font-size:18px">search</span><input type="text" placeholder="Cari tiket atau solusi..." class="flex-1 border-none bg-transparent text-sm text-slate-600 outline-none"></div></header>
<main class="flex-1 p-6">
<div class="mb-6"><h1 class="text-lg font-semibold text-slate-900">Buat Tiket Baru</h1><p class="text-sm text-slate-500">Laporkan masalah atau permintaan kepada tim IT</p></div>
<form class="space-y-5 rounded-lg border border-slate-200 bg-white p-6">
<div><label class="mb-1.5 block text-sm font-medium text-slate-700">Kategori</label><select class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"><option value="">Pilih kategori</option><option>Hardware</option><option>Software</option><option>Jaringan</option><option>Akses Akun</option><option>Lainnya</option></select></div>
<div><label class="mb-1.5 block text-sm font-medium text-slate-700">Judul</label><input class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500" placeholder="Deskripsi singkat masalah Anda" value="Laptop tidak bisa menyala"></div>
<div><label class="mb-1.5 block text-sm font-medium text-slate-700">Deskripsi Lengkap</label><textarea class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500" rows="6" placeholder="Jelaskan masalah atau permintaan Anda secara detail...">Laptop tiba-tiba mati dan tidak bisa dinyalakan kembali. Sudah dicoba charge tapi tidak ada respon.</textarea></div>
<div><label class="mb-1.5 block text-sm font-medium text-slate-700">Prioritas</label><select class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"><option>Kritis</option><option selected>Tinggi</option><option>Sedang</option><option>Rendah</option></select></div>
<div><label class="mb-2 block text-sm font-medium text-slate-700">Lampiran (0/5)</label>
<div class="flex flex-wrap gap-2">
<button type="button" class="inline-flex items-center gap-2 rounded-md border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50"><span class="material-symbols-outlined" style="font-size:18px">photo_camera</span>Ambil Foto</button>
<label class="inline-flex cursor-pointer items-center gap-2 rounded-md border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50"><span class="material-symbols-outlined" style="font-size:18px">attach_file</span>Pilih File<input type="file" multiple class="sr-only"></label>
</div></div>
<div class="flex gap-3 pt-2">
<button type="submit" class="rounded-md bg-teal-600 px-6 py-2.5 text-sm font-medium text-white hover:bg-teal-700 disabled:opacity-50">Kirim Tiket</button>
<a href="portal-tickets.html" class="rounded-md border border-slate-300 px-6 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50">Batal</a>
</div>
</form>
</main></div></div></body></html>
