<!DOCTYPE html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Login — Helpdesk</title><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{colors:{teal:{50:'#f0fdfa',100:'#ccfbf1',200:'#99f6e4',600:'#0d9488',700:'#0f766e'},slate:{50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',900:'#0f172a'},rose:{600:'#e11d48'}}}}}</script><link rel="stylesheet" href="../fonts/material-symbols-subset.css"><style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}body{font-family:'Inter',ui-sans-serif,system-ui,sans-serif}</style></head>
<body>
<div class="flex min-h-screen items-center justify-center bg-slate-50 px-4">
  <div class="w-full max-w-sm">
    <div class="mb-8 text-center">
      <div class="mx-auto mb-3 flex h-10 w-10 items-center justify-center rounded-lg bg-teal-600">
        <span class="material-symbols-outlined text-white" style="font-size:22px">support_agent</span>
      </div>
      <h1 class="text-lg font-semibold text-slate-900">Helpdesk Ticketing</h1>
      <p class="mt-1 text-sm text-slate-500">Masuk ke akun Anda</p>
    </div>
    <form class="rounded-lg border border-slate-200 bg-white p-6">
      <div class="mb-4">
        <label class="mb-1.5 block text-sm font-medium text-slate-700">Email</label>
        <input type="email" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500" placeholder="nama@perusahaan.com" value="user@helpdesk.com">
      </div>
      <div class="mb-4">
        <label class="mb-1.5 block text-sm font-medium text-slate-700">Password</label>
        <input type="password" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500" placeholder="Masukkan password" value="password">
      </div>
      <div class="mb-5 flex items-center">
        <input type="checkbox" id="remember" class="h-3.5 w-3.5 rounded border-slate-300 text-teal-600 focus:ring-teal-500" checked>
        <label for="remember" class="ml-2 text-sm text-slate-600">Ingat saya</label>
      </div>
      <button type="submit" class="w-full rounded-md bg-teal-600 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2">Masuk</button>
    </form>
    <p class="mt-4 text-center text-sm text-slate-500">Belum punya akun? <a href="register.html" class="font-medium text-teal-600 hover:text-teal-500">Daftar sekarang</a></p>
  </div>
</div>
</body></html>
