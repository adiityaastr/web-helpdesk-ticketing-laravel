services:
  # --------------------------------------------------------------------
  # PHP-FPM 8.3 — Application Server
  # --------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helpdesk-app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - app-storage:/var/www/html/storage
      - app-vendor:/var/www/html/vendor
    environment:
      COMPOSER_PROCESS_TIMEOUT: 600
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # --------------------------------------------------------------------
  # Nginx — Web Server + Reverse Proxy
  # --------------------------------------------------------------------
  nginx:
    image: nginx:stable-alpine
    container_name: helpdesk-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    depends_on:
      - app

  # --------------------------------------------------------------------
  # MySQL 8 — Database
  # --------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: helpdesk-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: helpdesk_db
      MYSQL_USER: helpdesk
      MYSQL_PASSWORD: secret
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------
  # Redis 7 — Cache & Session Driver
  # --------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: helpdesk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

  # --------------------------------------------------------------------
  # Queue Worker — Redis Queue Driver
  # --------------------------------------------------------------------
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helpdesk-queue
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - app-vendor:/var/www/html/vendor
    networks:
      - app-network
    depends_on:
      app:
        condition: service_started
    entrypoint: ""
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-jobs=1000 --max-time=3600

  # --------------------------------------------------------------------
  # Vite Dev Server — React + Tailwind Hot-Reload (opsional)
  #   Jalankan: docker compose --profile dev up vite
  # --------------------------------------------------------------------
  vite:
    image: node:22-alpine
    container_name: helpdesk-vite
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vite-node-modules:/var/www/html/node_modules
    ports:
      - "5173:5173"
    networks:
      - app-network
    profiles:
      - dev
    command: /bin/sh -c "npm install --ignore-scripts && exec npm run dev"

# ----------------------------------------------------------------------
# Volumes
# ----------------------------------------------------------------------
volumes:
  db-data:
  redis-data:
  app-storage:
  app-vendor:
  vite-node-modules:

# ----------------------------------------------------------------------
# Network
# ----------------------------------------------------------------------
networks:
  app-network:
    driver: bridge
