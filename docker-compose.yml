x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

x-app-defaults: &app-defaults
  build:
    context: .
    dockerfile: Dockerfile
  networks:
    - app-network
  restart: unless-stopped

services:
  app:
    <<: *app-defaults
    container_name: helpdesk-app
    hostname: app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - app-storage:/var/www/html/storage
      - app-vendor:/var/www/html/vendor
    environment:
      COMPOSER_PROCESS_TIMEOUT: 600
      PHP_IDE_CONFIG: serverName=helpdesk
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
    labels:
      - "app.description=PHP-FPM Application Server"
      - "app.version=8.3"

  nginx:
    image: nginx:1.26-alpine
    container_name: helpdesk-nginx
    hostname: nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-logs:/var/log/nginx
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost/health || exit 1"]
    labels:
      - "app.description=Nginx Web Server"

  db:
    image: mysql:8.0
    container_name: helpdesk-db
    hostname: db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-helpdesk_db}
      MYSQL_USER: ${DB_USERNAME:-helpdesk}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - db-backups:/backups
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${DB_ROOT_PASSWORD:-secret} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "app.description=MySQL 8.0 Database"

  redis:
    image: redis:7-alpine
    container_name: helpdesk-redis
    hostname: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - app-network
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
    labels:
      - "app.description=Redis 7 Cache Server"

  queue:
    <<: *app-defaults
    container_name: helpdesk-queue
    hostname: queue
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - app-vendor:/var/www/html/vendor
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/queue-worker.sh"]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
    labels:
      - "app.description=Queue Worker"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: helpdesk-mailhog
    hostname: mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app-network
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "echo | nc localhost 1025 || exit 1"]
    labels:
      - "app.description=MailHog Email Testing Server"

  adminer:
    image: adminer:4.8.1-standalone
    container_name: helpdesk-adminer
    hostname: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: nette
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "app.description=Adminer Database Management"

  vite:
    image: node:22-alpine
    container_name: helpdesk-vite
    hostname: vite
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vite-node-modules:/var/www/html/node_modules
    ports:
      - "5173:5173"
    networks:
      - app-network
    profiles:
      - dev
    command: /bin/sh -c "npm install --ignore-scripts && exec npm run dev -- --host"
    labels:
      - "app.description=Vite Development Server"

# ----------------------------------------------------------------------
# Volumes
# ----------------------------------------------------------------------
volumes:
  db-data:
  db-backups:
  redis-data:
  app-storage:
  app-vendor:
  vite-node-modules:
  nginx-logs:

# ----------------------------------------------------------------------
# Network
# ----------------------------------------------------------------------
networks:
  app-network:
    driver: bridge
