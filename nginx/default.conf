server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    # ------------------------------------------------------------------
    # Gzip Compression
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    client_max_body_size 20M;

    # ------------------------------------------------------------------
    # Laravel URL Rewrite
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ------------------------------------------------------------------
    # PHP-FPM Proxy
    # ------------------------------------------------------------------
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # ------------------------------------------------------------------
    # Deny hidden files
    # ------------------------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ------------------------------------------------------------------
    # Cache static assets
    # ------------------------------------------------------------------
    location ~* \.(?:css|js|svg|woff2?|ttf|eot|otf|png|jpg|jpeg|gif|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
