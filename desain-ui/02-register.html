<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Helpdesk Ticketing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50">
    <div class="flex min-h-screen items-center justify-center px-4 py-8">
        <div class="w-full max-w-sm">
            <div class="mb-8 text-center">
                <div class="mx-auto mb-3 flex h-10 w-10 items-center justify-center rounded-lg bg-teal-600">
                    <span class="material-symbols-outlined text-white" style="font-size:22px">support_agent</span>
                </div>
                <h1 class="text-lg font-semibold text-slate-900">Buat Akun Baru</h1>
                <p class="mt-1 text-sm text-slate-500">Daftar untuk mengakses helpdesk</p>
            </div>

            <form class="rounded-lg border border-slate-200 bg-white p-6">
                <div class="mb-4">
                    <label class="mb-1.5 block text-sm font-medium text-slate-700">Nama Lengkap</label>
                    <input type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500" placeholder="Nama lengkap">
                </div>

                <div class="mb-4">
                    <label class="mb-1.5 block text-sm font-medium text-slate-700">Email</label>
                    <input type="email" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500" placeholder="nama@perusahaan.com">
                </div>

                <div class="mb-4 grid gap-3 md:grid-cols-2">
                    <div>
                        <label class="mb-1.5 block text-sm font-medium text-slate-700">Telepon</label>
                        <input type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500" placeholder="Opsional">
                    </div>
                    <div>
                        <label class="mb-1.5 block text-sm font-medium text-slate-700">Departemen</label>
                        <input type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500" placeholder="Opsional">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="mb-1.5 block text-sm font-medium text-slate-700">Password</label>
                    <input type="password" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500" placeholder="Minimal 8 karakter">
                </div>

                <div class="mb-5">
                    <label class="mb-1.5 block text-sm font-medium text-slate-700">Konfirmasi Password</label>
                    <input type="password" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500" placeholder="Ulangi password">
                </div>

                <button type="submit" class="w-full rounded-md bg-teal-600 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2">
                    Daftar
                </button>
            </form>

            <p class="mt-4 text-center text-sm text-slate-500">
                Sudah punya akun? <a href="01-login.html" class="font-medium text-teal-600 hover:text-teal-500">Masuk</a>
            </p>
        </div>
    </div>
</body>
</html>
